<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="title-group">
      <h1>OBD Dashboard</h1>
      <div class="status-badge" [ngClass]="(connectionStatus$ | async) || 'disconnected'">
        {{ connectionStatus$ | async }}
      </div>
    </div>
    
    <div class="mode-controls">
      <button (click)="setMode('normal')">Normal</button>
      <button (click)="setMode('lean')">Lean</button>
      <button (click)="setMode('rich')">Rich</button>
      <button (click)="setMode('vacuum-leak')">Vacuum Leak</button>
    </div>
  </header>

  <section class="metrics-grid">
    <app-metric-card 
      label="RPM" 
      [value]="latestFrame?.rpm || 0" 
      unit="RPM">
    </app-metric-card>
    
    <app-metric-card 
      label="Speed" 
      [value]="latestFrame?.speed || 0" 
      unit="km/h">
    </app-metric-card>
    
    <app-metric-card 
      label="Coolant Temp" 
      [value]="latestFrame?.coolantTemp || 0" 
      unit="°C">
    </app-metric-card>
    
    <app-metric-card 
      label="STFT B1" 
      [value]="latestFrame?.stftB1 || 0" 
      unit="%">
    </app-metric-card>
    
    <app-metric-card 
      label="LTFT B1" 
      [value]="latestFrame?.ltftB1 || 0" 
      unit="%">
    </app-metric-card>
    
    <app-metric-card 
      label="Throttle Position" 
      [value]="latestFrame?.throttlePosition || 0" 
      unit="%">
    </app-metric-card>
  </section>

  <div class="placeholders">
    <div class="placeholder-card">
      <h3>Live Charts</h3>
      <p>Data visualization placeholder</p>
    </div>
    <div class="placeholder-card">
      <h3>Diagnostic Panel</h3>
      <p>Issue detection placeholder</p>
    </div>
  </div>
</div>
