<div class="dashboard-container">
  <header class="dashboard-header">
    <div class="title-group">
      <h1>Live Diagnostics</h1>
      <div class="status-badge" [ngClass]="(connectionStatus$ | async) || 'disconnected'">
        {{ connectionStatus$ | async }}
      </div>
    </div>
    
    <div class="mode-controls">
      <button (click)="setMode('normal')">Normal</button>
      <button (click)="setMode('lean')">Lean</button>
      <button (click)="setMode('rich')">Rich</button>
      <button (click)="setMode('vacuum-leak')">Vacuum Leak</button>
    </div>
  </header>

  <section class="metrics-grid">
    <app-metric-card 
      label="RPM" 
      [value]="latestFrame?.rpm || 0" 
      unit="RPM">
    </app-metric-card>
    
    <app-metric-card 
      label="Speed" 
      [value]="latestFrame?.speed || 0" 
      unit="km/h">
    </app-metric-card>
    
    <app-metric-card 
      label="Coolant" 
      [value]="latestFrame?.coolantTemp || 0" 
      unit="°C">
    </app-metric-card>
    
    <app-metric-card 
      label="STFT" 
      [value]="latestFrame?.stftB1 || 0" 
      unit="%">
    </app-metric-card>
    
    <app-metric-card 
      label="LTFT" 
      [value]="latestFrame?.ltftB1 || 0" 
      unit="%">
    </app-metric-card>
    
    <app-metric-card 
      label="Throttle" 
      [value]="latestFrame?.throttlePosition || 0" 
      unit="%">
    </app-metric-card>
  </section>

  <div class="dashboard-layout">
    <section class="charts-area">
      <div class="placeholder-card">
        <h3>Live Data Stream</h3>
        <p>Chart integration pending...</p>
      </div>
    </section>

    <aside class="alerts-area">
      <div class="alerts-panel">
        <div class="panel-header">
          <h3>Diagnostic Alerts</h3>
          <span class="count" *ngIf="(activeResults$ | async)?.length">
            {{ (activeResults$ | async)?.length }} Issues
          </span>
        </div>

        <div class="alerts-list">
          <div *ngIf="!(activeResults$ | async)?.length" class="no-alerts">
            <p>No issues detected</p>
          </div>

          <div 
            *ngFor="let result of (activeResults$ | async)" 
            class="alert-item" 
            [ngClass]="result.severity">
            <div class="alert-title">
              <span class="severity-icon">!</span>
              {{ result.title }}
            </div>
            <div class="alert-explanation">
              {{ result.explanation }}
            </div>
            <div class="alert-evidence" *ngIf="result.evidence.length">
              <ul>
                <li *ngFor="let ev of result.evidence">{{ ev }}</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>
</div>
