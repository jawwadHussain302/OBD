<div class="dashboard-container">
  <header>
    <div class="title-group">
      <h1>Dashboard</h1>
      <div class="status-pill" [ngClass]="(connectionStatus$ | async) || 'disconnected'">
        {{ connectionStatus$ | async }}
      </div>
    </div>
    
    <div class="modes">
      <button (click)="setMode('normal')">Normal</button>
      <button (click)="setMode('lean')">Lean</button>
      <button (click)="setMode('rich')">Rich</button>
      <button (click)="setMode('vacuum-leak')">Vacuum Leak</button>
    </div>
  </header>

  <section class="grid">
    <app-metric-card label="RPM" [value]="latestFrame?.rpm || 0" unit="RPM"></app-metric-card>
    <app-metric-card label="Speed" [value]="latestFrame?.speed || 0" unit="km/h"></app-metric-card>
    <app-metric-card label="Coolant" [value]="latestFrame?.coolantTemp || 0" unit="°C"></app-metric-card>
    <app-metric-card label="STFT" [value]="latestFrame?.stftB1 || 0" unit="%"></app-metric-card>
    <app-metric-card label="LTFT" [value]="latestFrame?.ltftB1 || 0" unit="%"></app-metric-card>
    <app-metric-card label="Throttle" [value]="latestFrame?.throttlePosition || 0" unit="%"></app-metric-card>
  </section>

  <div class="analysis-section">
    <section class="charts-placeholder">
      <div class="card">
        <h3>Live Charts</h3>
        <p>Visualization pending...</p>
      </div>
    </section>

    <aside class="diagnostics-panel">
      <div class="card">
        <div class="panel-header">
          <h3>Diagnostics</h3>
          <span class="active-count" *ngIf="(activeResults$ | async)?.length">
            {{ (activeResults$ | async)?.length }} Issues Detected
          </span>
        </div>

        <div class="results-list">
          <div *ngIf="!(activeResults$ | async)?.length" class="empty-state">
            No issues detected
          </div>

          <div 
            *ngFor="let result of (activeResults$ | async)" 
            class="diagnostic-item" 
            [ngClass]="result.severity">
            <div class="item-title">
              <span class="icon">!</span>
              {{ result.title }}
            </div>
            <div class="item-explanation">
              {{ result.explanation }}
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>
</div>
