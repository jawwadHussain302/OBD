<div class="metric-card">
  <div class="label">{{ label }}</div>
  <div class="value-container">
    <span class="value">{{ value }}</span>
    <span class="unit">{{ unit }}</span>
  </div>
  <div *ngIf="trend" class="trend" [ngClass]="trend">
    {{ trend === 'up' ? '▲' : trend === 'down' ? '▼' : '▬' }}
  </div>
</div>
